# LERNA Phase 2: LoRA/QLoRA Configurations for Generative Models
# These configs are used by scripts/run_generative_experiment.py
#
# All models require a HuggingFace token with Llama access:
#   huggingface-cli login
#   # or set HF_TOKEN environment variable

# ============================================================
# Llama-2-7B (LoRA) - Primary generative model
# ============================================================
llama2_7b_lora:
  model_name: "meta-llama/Llama-2-7b-hf"
  model_short: "llama2-7b"
  params: "7B"
  mode: "lora"

  # LoRA hyperparameters (standard from Hu et al. 2021)
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    bias: "none"
    task_type: "CAUSAL_LM"

  # Training defaults (override per-task as needed)
  training:
    per_device_train_batch_size: 4
    per_device_eval_batch_size: 8
    gradient_accumulation_steps: 8   # effective batch = 32
    learning_rate: 2.0e-4
    weight_decay: 0.01
    warmup_ratio: 0.03
    num_train_epochs: 3
    max_length: 512
    bf16: true
    gradient_checkpointing: true
    optim: "adamw_torch"
    lr_scheduler_type: "cosine"

  # Hardware (RTX 5090 32GB)
  hardware:
    max_memory_gb: 28  # leave headroom
    dataloader_num_workers: 4


